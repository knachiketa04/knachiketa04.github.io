<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ pagetitle }}</title>
<meta name="description" content="{{ description }}">
<link rel="canonical" href="https://knachiketa04.github.io/{{ slug }}.html">
<!-- Open Graph / Twitter cards. og:image is added per-post later; until then
     social platforms render the text-only card from the title + description.
     When an image exists, add <meta property="og:image"> and switch
     twitter:card to "summary_large_image". -->
<meta property="og:type" content="article">
<meta property="og:site_name" content="Notes from the AIHomeLab">
<meta property="og:title" content="{{ title }}">
<meta property="og:description" content="{{ description }}">
<meta property="og:url" content="https://knachiketa04.github.io/{{ slug }}.html">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="{{ title }}">
<meta name="twitter:description" content="{{ description }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
{{ styles }}
</style>
</head>
<body>

{{ nav }}

<div class="page">

  <header class="page-header">
    <h1>{{ title }}</h1>
    <p class="subtitle">{{ subtitle }}</p>
    <p class="meta">{{ byline }}</p>
  </header>

  <div class="body-grid">

    <aside class="sidebar sidebar-left" aria-label="Page metadata">
{{ meta_cards }}
    </aside>

    <main class="content">

{{ content }}

    </main>

    <aside class="sidebar sidebar-right" aria-label="On this page">
      <div class="toc-label">On this page</div>
      <nav class="toc">
{{ toc }}
      </nav>
    </aside>

  </div>

  <footer class="page-footer">
    <p class="footer-home"><a href="index.html">&larr; All posts</a></p>
    <p>{{ sourcenote }}</p>
    <p>Open an issue at <a href="https://github.com/knachiketa04/knachiketa04.github.io/issues" target="_blank" rel="noopener">github.com/knachiketa04/knachiketa04.github.io/issues</a>.</p>
  </footer>
</div>

</body>
</html>
